---
- name: Include user creation task
  ansible.builtin.include_tasks: tasks/create_user_and_directories.yml
  vars:
    home: "{{ obol_lodestar_monitor_home_dir }}"
    directories: "{{ obol_lodestar_monitor_directories }}"
    log_file_path: "{{ obol_lodestar_monitor_log_file_path }}"

- name: Copy obol lodestar monitor script
  ansible.builtin.template:
    src: obol_lodestar_monitor.sh.j2
    dest: "{{ obol_lodestar_monitor_script_file_path }}"
    owner: "{{ service_identifier }}"
    group: "{{ service_group }}"
    mode: "0755"

- name: Copy systemd service file
  ansible.builtin.template:
    src: systemd.service.j2
    dest: "/etc/systemd/system/{{ service_identifier }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload service

- name: Copy timer service file
  ansible.builtin.template:
    src: systemd.timer.j2
    dest: "/etc/systemd/system/{{ service_identifier }}.timer"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload service
    - Restart timer
